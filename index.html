<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURIM M-T | משכן התלמוד</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #4b0082; --g: #d4af37; --o: #ff8c00; --cream: #fffdf0; }
        body { background: #fdfaf0; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; padding-bottom: 60px; }

        .header { background: linear-gradient(135deg, var(--p), #2a004a); color: var(--g); width: 100%; padding: 40px 0; text-align: center; border-bottom: 6px solid var(--g); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .logo-text { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; display: block; }
        .mask-icon { font-size: 2.5rem; margin-bottom: 10px; display: inline-block; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .container { max-width: 500px; width: 90%; margin: -30px auto 30px; position: relative; z-index: 10; }
        .card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 2px solid var(--g); text-align: center; }

        .segula-card { background: var(--cream); border: 2px dashed var(--o); padding: 15px; border-radius: 15px; margin-bottom: 15px; min-height: 60px; color: var(--p); font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .magic-btn { background: var(--o); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }

        .timer-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; background: var(--p); padding: 12px; border-radius: 15px; color: white; border: 1px solid var(--g); }
        .unit span { display: block; font-size: 1.4rem; color: var(--g); font-weight: bold; }

        .raised-text { font-size: 1.6rem; color: var(--p); font-weight: 900; margin-bottom: 10px; }
        .bar-bg { background: #eee; height: 30px; border-radius: 20px; overflow: hidden; border: 1px solid #ddd; }
        .bar-fill { background: linear-gradient(90deg, var(--o), var(--g)); width: 0%; height: 100%; transition: width 1.5s ease-in-out; }

        .btn-donate { display: block; background: linear-gradient(to bottom, #ffd700, var(--g)); color: var(--p); text-align: center; padding: 18px; border-radius: 50px; text-decoration: none; font-weight: 900; font-size: 1.5rem; box-shadow: 0 6px 15px rgba(212, 175, 55, 0.4); }

        .ticker-wrap { position: fixed; bottom: 0; width: 100%; overflow: hidden; background: var(--p); color: var(--g); padding: 10px 0; border-top: 3px solid var(--g); z-index: 100; font-weight: bold; }
        .ticker { display: inline-block; white-space: nowrap; padding-right: 100%; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        .ticker-item { display: inline-block; padding: 0 30px; }
        .ticker-item span { color: white; }
    </style>
</head>
<body>

<header class="header">
    <div class="mask-icon">🎭</div>
    <div class="logo-text">PURIM M-T</div>
    <h1>משכן התלמוד - הכל בשביל התורה!</h1>
</header>

<div class="container">
    <div class="card">
        <div class="segula-card" id="segula-display">לחצו להגרלת סגולה מיוחדת מהישיבה...</div>
        <button class="magic-btn" onclick="getSegula()">מתלבט כמה לתרום? ✨</button>

        <div class="timer-row">
            <div class="unit"><span id="d">00</span><small>ימים</small></div>
            <div class="unit"><span id="h">00</span><small>שעות</small></div>
            <div class="unit"><span id="m">00</span><small>דקות</small></div>
            <div class="unit"><span id="s">00</span><small>שניות</small></div>
        </div>

        <div class="progress-box">
            <div class="raised-text">גייסנו: <span id="raised-val">₪0</span></div>
            <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
            <p style="margin-top: 8px; font-weight: bold; color: #666;">יעד הקמפיין: 60,000 ₪</p>
        </div>

        <a href="https://www.matara.pro/nedarimplus/online/?mosad=7006742" class="btn-donate">תרום עכשיו וזכה!</a>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ticker">
        <div class="ticker-item">מ. כהן: <span>₪360</span></div>
        <div class="ticker-item">ידיד הישיבה: <span>₪1,000</span></div>
        <div class="ticker-item">משפחת אברהם: <span>₪180</span></div>
        <div class="ticker-item">PURIM M-T בתנופה! <span>🔥</span></div>
    </div>
</div>

<script>
    const targetGoal = 60000;
    const segulaList = [
        { s: "180 ₪", t: "סגולה בדוקה לחיים ארוכים ושמירה." },
        { s: "360 ₪", t: "סגולה לפתיחת המזל ולזיווג הגון." },
        { s: "500 ₪", t: "סגולה לפרנסה ברווח בברכת עשר תעשר." },
        { s: "1000 ₪", t: "סגולה לרפואה שלמה ונחת מהילדים." }
    ];

    function getSegula() {
        const item = segulaList[Math.floor(Math.random() * segulaList.length)];
        document.getElementById('segula-display').innerText = `תרומה של ${item.s} היא ${item.t}`;
        confetti({ particleCount: 50, colors: ['#4b0082', '#d4af37'] });
    }

    // פונקציה לעדכון הסכום מהשרת
    async function fetchRaisedAmount() {
        try {
            const response = await fetch('/api/amount');
            const data = await response.json();
            const currentRaised = data.total || 0;
            
            // עדכון המספר על המסך
            document.getElementById('raised-val').innerText = "₪" + currentRaised.toLocaleString();
            
            // עדכון מד ההתקדמות
            const percent = Math.min((currentRaised / targetGoal) * 100, 100);
            document.getElementById('bar').style.width = percent + "%";
        } catch (error) {
            console.error("שגיאה במשיכת נתונים מהשרת:", error);
        }
    }

    window.onload = () => {
        fetchRaisedAmount(); // משיכה ראשונה
        setInterval(fetchRaisedAmount, 30000); // עדכון כל 30 שניות
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#4b0082', '#d4af37'] });
    };

    // טיימר פורים
    const purimDate = new Date("March 3, 2026 00:00:00").getTime();
    setInterval(() => {
        const now = new Date().getTime();
        const dist = purimDate - now;
        if (dist > 0) {
            document.getElementById("d").innerText = Math.floor(dist / 86400000).toString().padStart(2,'0');
            document.getElementById("h").innerText = Math.floor((dist % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById("m").innerText = Math.floor((dist % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById("s").innerText = Math.floor((dist % 60000) / 1000).toString().padStart(2,'0');
        }
    }, 1000);
</script>
</body>
</html>
