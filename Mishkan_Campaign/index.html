<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קמפיין משכן התלמוד - שיעור ב'</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <header class="main-header">
        <h1>ישיבת משכן התלמוד</h1>
        <p class="sub-title">שיעור ב' בתנופה - פורים תשפ"ה</p>
    </header>

    <main class="container">
        <section class="lyrics-card">
            <div class="quote-icon">"</div>
            <p>בשיעור ב' הלב בוער, האש לא נכבית<br>
            משכן התלמוד זה הבית, זו התכלית!<br>
            <strong>בונים עולמות, עם כל הנשמות</strong></p>
        </section>

        <section class="progress-section">
            <h3>יעד הקמפיין: 50,000 ₪</h3>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
            <p id="progressStatus">גייסנו כבר: ₪32,500 (65%)</p>
        </section>

        <section class="donors-list">
            <h3>תרומות אחרונות 🎉</h3>
            <div id="donorsContainer">
                <div class="donor-item"><span>נדיב לב</span><span class="amount">₪1,800</span></div>
                <div class="donor-item"><span>בוגר הישיבה</span><span class="amount">₪500</span></div>
            </div>
        </section>

        <div class="action-area">
            <a href="https://www.matara.pro/nedarimplus/online/?mosad=7006742" class="btn-donate">לתרומה מאובטחת בנדרים פלוס</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
